<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Paz ✨</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="header">

        <div>
            <h1>Notas Paz ✨</h1>
            <p class="subtitle">Tu espacio bonito para organizarlo todo</p>
        </div>

        <button id="newNoteBtn">
            + Nueva nota
        </button>

    </div>


    <div class="tabs">

        <button class="tab active" id="notesTab">
            📝 Notas
        </button>

        <button class="tab" id="historyTab">
            📜 Historial
        </button>

    </div>


    <div class="searchBox">

        <input
                id="searchInput"
                placeholder="Buscar notas..."
        >

    </div>


    <div id="notesContainer">

    </div>


    <div id="historyContainer">

    </div>

</div>



<div class="modal hidden" id="modal">

    <div class="modalCard">

        <h2>Nueva nota</h2>

        <textarea
                id="noteText"
                placeholder="Escribe algo bonito..."
        ></textarea>


        <div class="row">

            <div>

                <label>Categoría</label>

                <input
                        id="categoryInput"
                        placeholder="food, pay, tourist..."
                >

            </div>


            <div>

                <label>Estado</label>

                <input
                        id="statusInput"
                        placeholder="pendiente, integración..."
                >

            </div>

        </div>


        <div class="buttons">

            <button id="cancelBtn">
                Cancelar
            </button>

            <button id="saveBtn">
                Guardar
            </button>

        </div>

    </div>

</div>


<script type="module" src="app.js"></script>

</body>
</html>
